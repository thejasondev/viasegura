    <line x1="0" y1="-16" x2="0" y2="-8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="-2" x2="0" y2="6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="12" x2="0" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="0" y1="26" x2="0" y2="34" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Checkmark -->
    <path d="M-10,-4 L-4,4 L12,-12" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" transform="translate(0,-14) scale(0.8)"/>
